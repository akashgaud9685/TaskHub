<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Background -->
  <rect width="600" height="500" rx="12" fill="#0f172a"/>
  <!-- Glow effects -->
  <circle cx="300" cy="250" r="180" fill="#a855f7" opacity="0.05"/>
  <circle cx="300" cy="250" r="120" fill="#06b6d4" opacity="0.04"/>
  <!-- Central connection hub -->
  <circle cx="300" cy="190" r="6" fill="#a855f7" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="300" y1="190" x2="180" y2="340" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>
  <line x1="300" y1="190" x2="420" y2="340" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.3"/>
  <line x1="180" y1="340" x2="420" y2="340" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.2"/>
  <!-- Person 1 (left) -->
  <circle cx="160" cy="270" r="28" fill="#334155"/>
  <circle cx="160" cy="270" r="24" fill="#475569"/>
  <circle cx="152" cy="264" r="4" fill="#94a3b8"/>
  <circle cx="168" cy="264" r="4" fill="#94a3b8"/>
  <path d="M152 276 Q160 282 168 276" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="140" y="298" width="40" height="20" rx="6" fill="#334155"/>
  <rect x="140" y="318" width="40" height="50" rx="6" fill="#334155"/>
  <rect x="130" y="368" width="20" height="50" rx="6" fill="#1e293b"/>
  <rect x="170" y="368" width="20" height="50" rx="6" fill="#1e293b"/>
  <!-- Person 2 (right) -->
  <circle cx="440" cy="270" r="28" fill="#334155"/>
  <circle cx="440" cy="270" r="24" fill="#475569"/>
  <circle cx="432" cy="264" r="4" fill="#94a3b8"/>
  <circle cx="448" cy="264" r="4" fill="#94a3b8"/>
  <path d="M432 276 Q440 282 448 276" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="420" y="298" width="40" height="20" rx="6" fill="#334155"/>
  <rect x="420" y="318" width="40" height="50" rx="6" fill="#1e293b"/>
  <rect x="410" y="368" width="20" height="50" rx="6" fill="#1e293b"/>
  <rect x="450" y="368" width="20" height="50" rx="6" fill="#1e293b"/>
  <!-- Person 3 (center back) -->
  <circle cx="300" cy="140" r="22" fill="#334155"/>
  <circle cx="300" cy="140" r="18" fill="#475569"/>
  <circle cx="294" cy="135" r="3" fill="#94a3b8"/>
  <circle cx="306" cy="135" r="3" fill="#94a3b8"/>
  <path d="M294 145 Q300 150 306 145" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <rect x="286" y="162" width="28" height="14" rx="4" fill="#334155"/>
  <rect x="286" y="176" width="28" height="36" rx="4" fill="#1e293b"/>
  <!-- Table -->
  <rect x="180" y="390" width="240" height="12" rx="6" fill="#334155"/>
  <rect x="200" y="402" width="10" height="30" fill="#1e293b"/>
  <rect x="390" y="402" width="10" height="30" fill="#1e293b"/>
  <!-- Laptop on table -->
  <rect x="260" y="358" width="80" height="32" rx="4" fill="#475569"/>
  <rect x="256" y="354" width="88" height="6" rx="3" fill="#334155"/>
  <rect x="268" y="364" width="64" height="12" rx="2" fill="#a855f7" opacity="0.4"/>
  <rect x="268" y="380" width="64" height="4" rx="2" fill="#475569"/>
  <rect x="268" y="372" width="48" height="4" rx="2" fill="#475569"/>
  <rect x="268" y="384" width="36" height="2" rx="1" fill="#475569"/>
  <!-- Floating stats -->
  <rect x="90" y="180" width="60" height="30" rx="8" fill="#a855f7" opacity="0.15"/>
  <text x="100" y="200" fill="#a855f7" font-size="11" font-weight="bold" font-family="Inter,sans-serif">98%</text>
  <rect x="430" y="420" width="70" height="30" rx="8" fill="#10b981" opacity="0.15"/>
  <text x="440" y="440" fill="#10b981" font-size="9" font-weight="bold" font-family="Inter,sans-serif">Done</text>
  <!-- Task nodes -->
  <circle cx="180" cy="210" r="4" fill="#10b981"/>
  <circle cx="420" cy="210" r="4" fill="#06b6d4"/>
  <circle cx="240" cy="340" r="3" fill="#f59e0b"/>
  <circle cx="360" cy="340" r="3" fill="#f59e0b"/>
  <rect x="100" y="400" width="16" height="16" rx="4" fill="#a855f7" opacity="0.5"/>
  <rect x="484" y="180" width="16" height="16" rx="4" fill="#06b6d4" opacity="0.5"/>
  <rect x="140" y="328" width="12" height="12" rx="3" fill="#10b981" opacity="0.5"/>
  <rect x="448" y="330" width="12" height="12" rx="3" fill="#10b981" opacity="0.5"/>
</svg>
